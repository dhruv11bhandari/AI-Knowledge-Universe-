<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AI Knowledge Universe{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="{{ url_for('dashboard') }}" class="logo">AI Knowledge Universe</a>
      <nav class="main-nav">
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('search') }}">Search</a>
        <a href="{{ url_for('graph_page') }}">Graph</a>
      </nav>
    </div>
  </header>

  <main class="container page-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>AI Knowledge Universe &mdash; a student project exploring the AI ecosystem with embeddings, semantic search, and knowledge graphs.</p>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
